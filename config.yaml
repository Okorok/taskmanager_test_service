http:
  addr: ":8080"
  read_timeout: 5s
  write_timeout: 10s
  idle_timeout: 60s

db:
  dsn: "app:app@tcp(db:3306)/app?parseTime=true&loc=UTC"
  max_open_conns: 25
  max_idle_conns: 25
  conn_max_lifetime: 5m

redis:
  addr: "redis:6379"
  password: ""
  db: 0
  task_list_ttl: 5m

auth:
  jwt_secret: "super-secret-jwt-key"
  token_ttl: 24h
